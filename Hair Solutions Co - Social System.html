<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hair Solutions Co. — Social Design System</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg); }
    code { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 0.9em; background: oklch(0.94 0.002 250); padding: 1px 6px; border-radius: 4px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="hsc-surface dir-refined">
  <div id="root"></div>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/SystemPageShell.jsx"></script>
  <script type="text/babel" src="components/SocialBlocks.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <div>
          <SystemHeader title="Social Design System" subtitle="Seven post archetypes + three story templates. One visual language across the feed." current="Social" />

          <Section eyebrow="01 · Foundation" title="The grid"
            intro="Posts ship at 1080×1080. Stories at 1080×1920. Type sized for thumb-readable: nothing under 22pt at export size. Body off-white is the default canvas; obsidian is reserved for hero, collection, sale.">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Format specs</SubHead>
                <RuleList items={[
                  <><b>Feed post:</b> 1080×1080. Safe area 80px from each edge.</>,
                  <><b>Story:</b> 1080×1920. Top 250px / bottom 280px reserved for IG UI.</>,
                  <><b>Reel cover:</b> 1080×1920 cropped to 1080×1350 in feed — keep type centered vertically.</>,
                  <><b>Carousel:</b> max 5 slides per post. Slide 1 hooks, last slide CTAs.</>,
                  <><b>Export:</b> PNG-24 or JPG q90. No transparency on feed posts.</>,
                ]} />
              </div>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Type at export size</SubHead>
                <RuleList items={[
                  <><b>Hook (1 line):</b> 88–110pt, 800, uppercase, -0.04em tracking.</>,
                  <><b>Headline:</b> 60–72pt, 700, sentence case, -0.025em.</>,
                  <><b>Body / blurb:</b> 28–32pt, 400, ink-muted on light or dark-muted on dark.</>,
                  <><b>Eyebrow / meta:</b> 22pt, 700, 0.18em uppercase.</>,
                  <><b>CTA chip:</b> 24pt, 700, 0.1em uppercase.</>,
                ]} />
              </div>
            </div>
          </Section>

          <Section eyebrow="02 · Post archetypes" title="Seven recipes"
            intro="Every post should map to one. If it doesn't, write a brief and ask before posting.">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(360px, 1fr))", gap: 32, justifyItems: "start" }}>
              <IGBlogPost />
              <IGProductPost />
              <IGCollectionPost />
              <IGHeroPost />
              <IGQuotePost />
              <IGSalePost />
              <IGAnnouncementPost />
            </div>
          </Section>

          <Section eyebrow="03 · Stories" title="Three templates"
            intro="Stories are vertical. Use a single message per frame. Chain frames for narrative.">
            <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
              <IGStoryProduct />
              <IGStoryQuote />
              <IGStorySale />
            </div>
          </Section>

          <Section eyebrow="04 · Composition rules" title="The non-negotiables">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Color cadence on the feed</SubHead>
                <RuleList items={[
                  <>Across any 9-tile grid: <b>1 hero (obsidian)</b>, <b>1 collection</b>, <b>2 product</b>, <b>2 blog or quote</b>, <b>1 sale or announcement</b>, <b>2 imagery-led</b>.</>,
                  <>Never two obsidian posts adjacent. Use a paper post between them.</>,
                  <>Cream/Clay only as accent in eyebrows or numbers — never as background.</>,
                  <>Wordmark always rectangular black on light, rectangular white on dark.</>,
                ]} />
              </div>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Voice + copy</SubHead>
                <RuleList items={[
                  <>Sentence case for headlines except <b>Hero</b> + <b>Sale</b> (uppercase).</>,
                  <>One idea per post. If you can't say it in 14 words, it's two posts.</>,
                  <>Always end with a CTA hint: "Link in bio →", "Read it →", "Shop →".</>,
                  <>Brand voice: confident, technical, never cute. Imagine a master tailor.</>,
                ]} />
              </div>
            </div>
          </Section>

          <Section eyebrow="05 · Carousel patterns" title="Multi-slide">
            <div className="hsc-card" style={{ padding: 24 }}>
              <RuleList items={[
                <><b>How-it-works (5 slides):</b> Hook → Step 1 → Step 2 → Step 3 → CTA. Use the Blog Article template for slide 1, the Hero template for the CTA slide.</>,
                <><b>Before / After (3 slides):</b> Before (paper) → Process (obsidian) → After (paper). Stack like a triptych.</>,
                <><b>Drop reveal (4 slides):</b> Tease (obsidian hero) → Detail 1 (product) → Detail 2 (product) → Sale (obsidian).</>,
                <><b>Testimonial set (3 slides):</b> Three quote posts in a row, all on body off-white.</>,
              ]} />
            </div>
          </Section>

          <Section eyebrow="06 · Asset checklist" title="Before posting">
            <div className="hsc-card" style={{ padding: 24 }}>
              <RuleList items={[
                <>File named <code>YYYYMMDD-archetype-slug.png</code> e.g. <code>20260512-product-french-lace.png</code>.</>,
                <>Wordmark visible on <b>every</b> post (rect, bottom-left or bottom-right).</>,
                <>Caption follows the format: hook (1 line) · context (2–3 lines) · CTA · hashtags (4–6, brand + topic).</>,
                <>Alt text written, not auto. Describe the image plus the message.</>,
                <>Story has a <b>tap target</b>: link sticker placed in the bottom 280px safe area.</>,
                <>Every shipped post archived to <code>03_content_and_marketing/01_social/published/</code>.</>,
              ]} />
            </div>
          </Section>

          <footer style={{ padding: "32px 48px", textAlign: "center", fontSize: 11, color: "var(--ink-muted)", letterSpacing: "0.04em" }}>v2.0 · Last updated 2026-04-29 · Owned by Hair Solutions Co. Brand</footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
